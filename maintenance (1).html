<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Under Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a0e;
    --surface: #0c1620;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --text: #e8f4f8;
    --muted: #4a7a8a;
    --glow: rgba(0, 212, 255, 0.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated grid background */
  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0, 212, 255, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 212, 255, 0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridMove 20s linear infinite;
    z-index: 0;
  }

  @keyframes gridMove {
    0% { transform: translateY(0); }
    100% { transform: translateY(60px); }
  }

  /* Radial glow in center */
  .glow-orb {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(ellipse, rgba(0,212,255,0.08) 0%, transparent 70%);
    z-index: 0;
    animation: pulse 4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
  }

  /* Floating particles */
  .particles {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: var(--accent);
    border-radius: 50%;
    opacity: 0;
    animation: floatUp var(--dur) linear var(--delay) infinite;
    left: var(--x);
    bottom: -10px;
  }

  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(0) scale(1); }
    10% { opacity: 1; }
    90% { opacity: 0.5; }
    100% { opacity: 0; transform: translateY(-100vh) scale(0.3); }
  }

  /* Main card */
  .card {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 64px 72px;
    max-width: 620px;
    width: 90%;
    background: linear-gradient(135deg, rgba(12,22,32,0.95), rgba(5,10,14,0.98));
    border: 1px solid rgba(0,212,255,0.18);
    border-radius: 4px;
    box-shadow: 0 0 80px rgba(0,212,255,0.08), 0 40px 80px rgba(0,0,0,0.5);
    animation: cardIn 1s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(40px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Top accent bar */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), var(--accent), transparent);
    animation: scanBar 3s ease-in-out infinite;
  }

  @keyframes scanBar {
    0%, 100% { opacity: 0.6; left: 10%; right: 10%; }
    50% { opacity: 1; left: 5%; right: 5%; }
  }

  /* Icon area */
  .icon-wrap {
    position: relative;
    width: 96px;
    height: 96px;
    margin: 0 auto 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: cardIn 1s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .icon-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1.5px solid rgba(0,212,255,0.25);
    animation: ringPulse 2.5s ease-in-out infinite;
  }

  .icon-ring:nth-child(2) {
    inset: -12px;
    border-color: rgba(0,212,255,0.12);
    animation-delay: 0.4s;
  }

  @keyframes ringPulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.06); opacity: 0.5; }
  }

  .icon-inner {
    width: 64px;
    height: 64px;
    background: rgba(0,212,255,0.06);
    border-radius: 50%;
    border: 1px solid rgba(0,212,255,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .icon-inner svg {
    width: 30px;
    height: 30px;
    stroke: var(--accent);
    animation: iconSpin 6s linear infinite;
    transform-origin: center;
  }

  @keyframes iconSpin {
    0%, 20% { transform: rotate(0deg); }
    80%, 100% { transform: rotate(360deg); }
  }

  /* Headline */
  .tag {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeSlide 0.8s 0.5s forwards;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 8vw, 72px);
    letter-spacing: 0.06em;
    line-height: 1;
    color: var(--text);
    margin-bottom: 20px;
    text-shadow: 0 0 40px rgba(0,212,255,0.2);
    opacity: 0;
    animation: fadeSlide 0.8s 0.65s forwards;
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    font-size: 15px;
    font-weight: 300;
    color: var(--muted);
    line-height: 1.7;
    max-width: 380px;
    margin: 0 auto 44px;
    opacity: 0;
    animation: fadeSlide 0.8s 0.8s forwards;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Progress bar */
  .progress-wrap {
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeSlide 0.8s 0.95s forwards;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .progress-label span:last-child {
    color: var(--accent);
    font-weight: 500;
  }

  .progress-track {
    height: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 999px;
    animation: fillBar 4s cubic-bezier(0.4, 0, 0.2, 1) 1.5s forwards;
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent);
  }

  @keyframes fillBar {
    0% { width: 0%; }
    30% { width: 42%; }
    60% { width: 68%; }
    80% { width: 79%; }
    100% { width: 84%; }
  }

  /* Loading dots */
  .loading-dots {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-bottom: 36px;
    opacity: 0;
    animation: fadeSlide 0.8s 1.1s forwards;
  }

  .dot {
    width: 5px;
    height: 5px;
    background: var(--accent);
    border-radius: 50%;
    animation: dotBounce 1.4s ease-in-out infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.18s; background: mix(var(--accent), var(--accent2)); }
  .dot:nth-child(3) { animation-delay: 0.36s; background: var(--accent2); }

  @keyframes dotBounce {
    0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
    40% { transform: scale(1.2); opacity: 1; }
  }

  /* Status chips */
  .status-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeSlide 0.8s 1.25s forwards;
  }

  .chip {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 14px;
    background: rgba(0,212,255,0.05);
    border: 1px solid rgba(0,212,255,0.12);
    border-radius: 3px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    transition: all 0.3s;
  }

  .chip:hover {
    background: rgba(0,212,255,0.1);
    border-color: rgba(0,212,255,0.3);
    color: var(--text);
  }

  .chip-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    animation: chipPulse 2s ease-in-out infinite;
  }

  .chip-dot.active { background: #22c55e; }

  @keyframes chipPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Corner decorations */
  .corner {
    position: absolute;
    width: 20px;
    height: 20px;
    opacity: 0.4;
  }

  .corner--tl { top: 12px; left: 12px; border-top: 1.5px solid var(--accent); border-left: 1.5px solid var(--accent); }
  .corner--tr { top: 12px; right: 12px; border-top: 1.5px solid var(--accent); border-right: 1.5px solid var(--accent); }
  .corner--bl { bottom: 12px; left: 12px; border-bottom: 1.5px solid var(--accent); border-left: 1.5px solid var(--accent); }
  .corner--br { bottom: 12px; right: 12px; border-bottom: 1.5px solid var(--accent); border-right: 1.5px solid var(--accent); }

  /* Scan line */
  .scanline {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(0,212,255,0.3), transparent);
    animation: scan 6s linear infinite;
    z-index: 1;
    pointer-events: none;
  }

  @keyframes scan {
    0% { top: 0%; opacity: 0; }
    5% { opacity: 1; }
    95% { opacity: 1; }
    100% { top: 100%; opacity: 0; }
  }
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="glow-orb"></div>
<div class="scanline"></div>

<!-- Floating particles -->
<div class="particles" id="particles"></div>

<div class="card">
  <!-- Corner accents -->
  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <!-- Icon -->
  <div class="icon-wrap">
    <div class="icon-ring"></div>
    <div class="icon-ring"></div>
    <div class="icon-inner">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
      </svg>
    </div>
  </div>

  <p class="tag">System Status · Active</p>
  <h1>Site Under<br><span>Maintenance</span></h1>
  <p class="subtitle">We're upgrading our systems to serve you better. Everything will be back online shortly — thanks for your patience.</p>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-label">
      <span>Restoration Progress</span>
      <span id="pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="fill"></div>
    </div>
  </div>

  <!-- Bouncing dots -->
  <div class="loading-dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <!-- Status chips -->
  <div class="status-row">
    <div class="chip"><div class="chip-dot active"></div>Servers Online</div>
    <div class="chip"><div class="chip-dot"></div>Deploying Updates</div>
    <div class="chip"><div class="chip-dot active"></div>Data Secured</div>
  </div>
</div>

<script>
  // Generate particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      --x: ${Math.random() * 100}%;
      --dur: ${6 + Math.random() * 10}s;
      --delay: ${Math.random() * 8}s;
      width: ${1 + Math.random() * 2}px;
      height: ${1 + Math.random() * 2}px;
      opacity: 0;
    `;
    container.appendChild(p);
  }

  // Animate percentage counter
  const pctEl = document.getElementById('pct');
  const targets = [0, 42, 68, 79, 84];
  const times = [0, 1200, 2400, 3200, 4000];
  let step = 0;

  function animatePct(from, to, duration) {
    const start = performance.now();
    function tick(now) {
      const t = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - t, 3);
      pctEl.textContent = Math.round(from + (to - from) * ease) + '%';
      if (t < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  setTimeout(() => {
    for (let i = 1; i < targets.length; i++) {
      const delay = times[i] - times[i - 1];
      const prev = i;
      setTimeout(() => {
        animatePct(targets[prev - 1], targets[prev], delay * 0.9);
      }, times[i - 1]);
    }
  }, 1500);
</script>
</body>
</html>
